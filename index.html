<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мессенджер с Push</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Стили остались без изменений */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .app {
      width: 100%; max-width: 480px; height: 90vh; max-height: 800px;
      background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    #auth-screen {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; gap: 15px;
    }
    #auth-screen h2 {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    #auth-screen input {
      width: 100%; padding: 12px; border: 2px solid #e8ecf1; border-radius: 12px;
      font-size: 16px; outline: none;
    }
    #auth-screen button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold;
      cursor: pointer; transition: opacity 0.3s;
    }
    #auth-screen button:hover { opacity: 0.9; }
    .auth-error { color: #ff4757; font-size: 14px; }
    .auth-link { color: #667eea; cursor: pointer; font-size: 14px; }

    .header {
      background: white; padding: 20px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .header h2 { font-size: 22px; font-weight: 600; }
    .header .user-info { display: flex; align-items: center; gap: 8px; }
    .logout-btn {
      background: #f5f7fa; border: none; border-radius: 12px; padding: 8px 14px;
      cursor: pointer; font-size: 14px; transition: background 0.2s;
    }
    .logout-btn:hover { background: #e8ecf1; }
    .notification-toggle {
      background: #f5f7fa; border: none; border-radius: 12px; padding: 10px;
      font-size: 18px; cursor: pointer; transition: all 0.2s;
    }
    .notification-toggle.active { background: #e8ecf1; }

    .messages-container {
      flex: 1; overflow-y: auto; padding: 20px; background: #fafbfc;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg {
      display: flex; align-items: flex-end; gap: 10px; animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 16px; flex-shrink: 0;
    }
    .bubble {
      background: white; padding: 12px 16px; border-radius: 20px 20px 20px 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 75%; word-wrap: break-word;
      position: relative;
    }
    .bubble .sender { font-weight: 600; color: #667eea; margin-bottom: 4px; font-size: 14px; }
    .bubble .text { color: #2d3436; font-size: 15px; line-height: 1.4; }
    .bubble audio {
      display: block; margin-top: 6px; width: 100%; border-radius: 12px; outline: none;
    }
    .bubble .duration { font-size: 12px; color: #888; margin-left: 6px; }
    .msg-time {
      font-size: 11px; color: #999; text-align: right; margin-top: 4px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .msg-date { font-size: 10px; color: #bbb; }

    .input-area {
      background: white; padding: 15px 20px; border-top: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    #msg-input {
      flex: 1; border: 2px solid #e8ecf1; border-radius: 24px;
      padding: 12px 20px; font-size: 15px; outline: none; min-width: 120px;
    }
    #msg-input:focus { border-color: #667eea; }
    .action-btn {
      background: #f5f7fa; border: none; border-radius: 24px;
      padding: 12px 18px; font-size: 16px; font-weight: 500; cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { background: #e8ecf1; }
    .record-btn {
      width: 46px; height: 46px; border-radius: 50%; background: #f5f7fa;
      border: none; font-size: 20px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .record-btn.recording {
      background: #ff4757; color: white; animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,71,87,0.7); }
      70% { box-shadow: 0 0 0 12px rgba(255,71,87,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
    }
    .timer { font-size: 14px; color: #888; min-width: 35px; text-align: center; }
    .error-msg { color: #ff4757; font-size: 13px; margin: 5px 10px; }
  </style>
</head>
<body>
<div id="auth-screen">
  <h2>Вход / Регистрация</h2>
  <input type="email" id="auth-email" placeholder="Email">
  <input type="password" id="auth-password" placeholder="Пароль (минимум 6 символов)">
  <button id="auth-action-btn">Войти</button>
  <span class="auth-link" id="switch-auth">Нет аккаунта? Зарегистрироваться</span>
  <div class="auth-error" id="auth-error"></div>
</div>

<div class="app" id="messenger-screen" style="display: none;">
  <div class="header">
    <h2>💬 Чат</h2>
    <div class="user-info">
      <span id="user-display-name"></span>
      <button class="logout-btn" id="logout-btn">Выйти</button>
      <button class="notification-toggle" id="notif-toggle" title="Уведомления">🔔</button>
    </div>
  </div>
  <div class="messages-container" id="messages"></div>
  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Сообщение..." maxlength="500">
    <button class="action-btn" onclick="sendMessage()">✉️</button>
    <button class="record-btn" id="voice-btn" title="Голосовое">🎤</button>
    <span class="timer" id="timer"></span>
  </div>
  <div id="mic-error" class="error-msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging.js";

  // =========== 1. ВСТАВЬ СВОЙ КОНФИГ ===========
    const firebaseConfig = {
  apiKey: "AIzaSyAlnrJNNmsfH2NhphvYN50i_GtlSgGUC30",
  authDomain: "fftf-6d8d0.firebaseapp.com",
  databaseURL: "https://fftf-6d8d0-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fftf-6d8d0",
  storageBucket: "fftf-6d8d0.firebasestorage.app",
  messagingSenderId: "467091018122",
  appId: "1:467091018122:web:2988d7028cf571b45df873"
};
  // ==========================================

  // =========== 2. ВСТАВЬ СВОЙ VAPID-КЛЮЧ ===========
  const VAPID_KEY = "BOp0CRKrufpXzJyyuSDMeGuv3_hNzOwecj8V_e9MriTdFpZ52efFiTKuY5VO25nW3SdQPg4DGFaPZSO9dVgG978";
  // ==================================================

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const messaging = getMessaging(app);

  // ---------- Аутентификация ----------
  let currentUser = null;
  const authScreen = document.getElementById('auth-screen');
  const messengerScreen = document.getElementById('messenger-screen');
  const authEmail = document.getElementById('auth-email');
  const authPassword = document.getElementById('auth-password');
  const authActionBtn = document.getElementById('auth-action-btn');
  const switchAuth = document.getElementById('switch-auth');
  const authError = document.getElementById('auth-error');
  const userDisplayName = document.getElementById('user-display-name');
  const logoutBtn = document.getElementById('logout-btn');
  let isLoginMode = true;

  function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    if (isLoginMode) {
      authActionBtn.textContent = 'Войти';
      switchAuth.textContent = 'Нет аккаунта? Зарегистрироваться';
    } else {
      authActionBtn.textContent = 'Зарегистрироваться';
      switchAuth.textContent = 'Уже есть аккаунт? Войти';
    }
  }
  switchAuth.addEventListener('click', toggleAuthMode);

  authActionBtn.addEventListener('click', async () => {
    const email = authEmail.value.trim();
    const password = authPassword.value;
    authError.textContent = '';
    if (!email || !password) { authError.textContent = 'Заполните все поля'; return; }
    try {
      if (isLoginMode) {
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        await createUserWithEmailAndPassword(auth, email, password);
      }
    } catch (err) { authError.textContent = err.message; }
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      authScreen.style.display = 'none';
      messengerScreen.style.display = 'flex';
      userDisplayName.textContent = user.email.split('@')[0];
      await requestPushPermission();
      startChat();
    } else {
      currentUser = null;
      authScreen.style.display = 'flex';
      messengerScreen.style.display = 'none';
    }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));

  // ---------- Push-уведомления ----------
  const notifToggle = document.getElementById('notif-toggle');
  const notifStorageKey = 'notifications_enabled';
  let notificationsEnabled = localStorage.getItem(notifStorageKey) !== 'false';

  async function requestPushPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
      const perm = await Notification.requestPermission();
      notificationsEnabled = perm === 'granted';
      localStorage.setItem(notifStorageKey, notificationsEnabled.toString());
      updateNotifUI();
    }
    if (notificationsEnabled) {
      try {
        const currentToken = await getToken(messaging, { vapidKey: VAPID_KEY });
        if (currentToken) {
  console.log('FCM Token:', currentToken);
  // Временно покажем токен на экране
  const tokenDisplay = document.createElement('div');
  tokenDisplay.id = 'fcm-token-display';
  tokenDisplay.style.cssText = 'position:fixed; bottom:20px; left:20px; right:20px; background:#fff; padding:10px; border:2px solid #667eea; border-radius:12px; word-break:break-all; z-index:9999; font-size:12px;';
  tokenDisplay.innerHTML = `<b>Твой токен (скопируй его):</b><br><span id="token-text">${currentToken}</span><br><button id="copy-token-btn" style="margin-top:6px; padding:6px 12px; background:#667eea; color:white; border:none; border-radius:8px;">Скопировать токен</button>`;
  document.body.appendChild(tokenDisplay);
  
  document.getElementById('copy-token-btn').addEventListener('click', () => {
    const tokenText = document.getElementById('token-text').innerText;
    navigator.clipboard.writeText(tokenText).then(() => {
      alert('Токен скопирован! Теперь вставь его в Firebase Console.');
    }).catch(() => {
      alert('Не удалось скопировать. Пожалуйста, выдели и скопируй токен вручную.');
    });
  });
}
  function updateNotifUI() {
    notifToggle.classList.toggle('active', notificationsEnabled);
    notifToggle.innerHTML = notificationsEnabled ? '🔔' : '🔕';
  }
  updateNotifUI();

  notifToggle.addEventListener('click', async () => {
    if (notificationsEnabled) {
      notificationsEnabled = false;
      localStorage.setItem(notifStorageKey, 'false');
    } else {
      if ('Notification' in window && Notification.permission !== 'granted') {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') {
          alert('Без разрешения уведомления не будут работать');
          return;
        }
      }
      notificationsEnabled = true;
      localStorage.setItem(notifStorageKey, 'true');
      await requestPushPermission();
    }
    updateNotifUI();
  });

  // Обработчик сообщений, когда приложение открыто
  onMessage(messaging, (payload) => {
    console.log('Сообщение получено: ', payload);
    const notificationTitle = payload.notification.title;
    const notificationOptions = {
      body: payload.notification.body,
      icon: '/my-chat/icon.png',
      vibrate: [200, 100, 200],
    };
    new Notification(notificationTitle, notificationOptions);
  });

  // ---------- Чат ----------
  let messagesRef;
  function startChat() {
    messagesRef = ref(db, 'messages');
    document.getElementById('messages').innerHTML = '';
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      displayMessage(msg);
      // Локальные уведомления больше не нужны, т.к. используются push
      // if ((document.hidden || !document.hasFocus()) && notificationsEnabled && Notification.permission === 'granted') {
      //   showNotification(msg);
      // }
    });
  }

  function displayMessage(msg) {
    const container = document.getElementById('messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg';
    const name = escapeHtml(msg.displayName || msg.name || 'Аноним');
    const initial = name.charAt(0).toUpperCase();

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = initial;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    let content = `<div class="sender">${name}</div>`;
    if (msg.type === 'voice') {
      const dur = formatDuration(msg.duration || 0);
      content += `<span class="text">🎤 Голосовое <span class="duration">${dur}</span></span>`;
      content += `<audio controls src="${msg.audioData}"></audio>`;
    } else {
      content += `<div class="text">${escapeHtml(msg.text || '')}</div>`;
    }

    const timeStr = msg.timestamp ? formatTime(msg.timestamp) : '';
    content += `<div class="msg-time"><span></span><span>${timeStr}</span></div>`;

    bubble.innerHTML = content;
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }

  function formatTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const time = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    if (date.toDateString() === now.toDateString()) {
      return time;
    } else {
      const dateStr = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
      return `${dateStr}, ${time}`;
    }
  }

  window.sendMessage = function() {
    if (!currentUser) return;
    const text = document.getElementById('msg-input').value.trim();
    if (!text) return;
    push(messagesRef, {
      name: currentUser.uid,
      displayName: currentUser.email.split('@')[0],
      text,
      type: 'text',
      timestamp: Date.now()
    });
    document.getElementById('msg-input').value = '';
  };

  // ---------- Голосовые сообщения ----------
  let voiceRecorder, voiceChunks, voiceStartTime, voiceTimerInterval, isVoiceRecording = false;
  const voiceBtn = document.getElementById('voice-btn');
  const timerSpan = document.getElementById('timer');

  async function startVoice() {
    if (isVoiceRecording || !currentUser) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = selectMimeType('audio');
      voiceRecorder = new MediaRecorder(stream, { mimeType: mimeType || undefined });
      voiceChunks = [];
      voiceRecorder.ondataavailable = e => { if (e.data.size > 0) voiceChunks.push(e.data); };
      voiceRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        if (!voiceChunks.length) return;
        const blob = new Blob(voiceChunks, { type: mimeType || 'audio/webm' });
        readBlobAsDataURL(blob).then(dataUrl => {
          const duration = Math.min((Date.now() - voiceStartTime) / 1000, 60);
          push(messagesRef, {
            name: currentUser.uid,
            displayName: currentUser.email.split('@')[0],
            type: 'voice',
            audioData: dataUrl,
            duration,
            timestamp: Date.now()
          });
        });
      };
      voiceRecorder.start();
      isVoiceRecording = true;
      voiceStartTime = Date.now();
      voiceBtn.classList.add('recording');
      voiceBtn.textContent = '🔴';
      timerSpan.textContent = '0с';
      voiceTimerInterval = setInterval(() => {
        timerSpan.textContent = Math.floor((Date.now() - voiceStartTime)/1000) + 'с';
      }, 200);
    } catch (e) {
      document.getElementById('mic-error').textContent = 'Нет доступа к микрофону';
    }
  }

  function stopVoice() {
    if (!isVoiceRecording || !voiceRecorder || voiceRecorder.state === 'inactive') return;
    voiceRecorder.stop();
    isVoiceRecording = false;
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '🎤';
    clearInterval(voiceTimerInterval);
    timerSpan.textContent = '';
  }

  function bindRecord(btn, startFn, stopFn) {
    btn.addEventListener('mousedown', e => { e.preventDefault(); startFn(); });
    btn.addEventListener('mouseup', e => { e.preventDefault(); stopFn(); });
    btn.addEventListener('mouseleave', e => { if (btn.classList.contains('recording')) stopFn(); });
    btn.addEventListener('touchstart', e => { e.preventDefault(); startFn(); });
    btn.addEventListener('touchend', e => { e.preventDefault(); stopFn(); });
    btn.addEventListener('touchcancel', e => { if (btn.classList.contains('recording')) stopFn(); });
  }
  bindRecord(voiceBtn, startVoice, stopVoice);

  // Вспомогательные функции
  function selectMimeType(kind) {
    const types = kind === 'audio' ? ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'] : [];
    return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  }
  function readBlobAsDataURL(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }
  function formatDuration(sec) {
    sec = Math.floor(sec);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }
  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  document.getElementById('msg-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') window.sendMessage();
  });

  // Регистрация сервис-воркера для PWA (оставляем)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/my-chat/sw.js')
      .catch(err => console.log('SW не зарегистрирован', err));
  }
</script>
</body>
</html>
