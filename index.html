<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мессенджер с голосовыми</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 0 15px; }
    #messages { border: 1px solid #ccc; border-radius: 8px; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fafafa; }
    .msg { margin-bottom: 10px; line-height: 1.4; }
    .msg strong { color: #0077cc; }
    .voice-msg audio { width: 100%; max-width: 250px; margin-top: 4px; }
    .voice-msg .duration { color: #888; font-size: 0.85em; margin-left: 5px; }

    .input-area { display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }
    #name-input { width: 100px; }
    #msg-input { flex: 1; }
    button { padding: 10px 15px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; background: #eee; }
    button:active { background: #ddd; }

    .record-btn {
      background: #f0f0f0;
      font-size: 20px;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
      user-select: none;
    }
    .record-btn.recording {
      background: #ff4444;
      color: white;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.5); }
      70% { box-shadow: 0 0 0 12px rgba(255,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
    }
    #timer { font-size: 0.9em; color: #888; min-width: 40px; text-align: center; }

    .error { color: #d00; font-size: 0.8em; margin: 5px 0; }
  </style>
</head>
<body>
  <h2>Мой мессенджер 🎤</h2>
  <div>
    <label>Твоё имя: <input type="text" id="name-input" placeholder="Ник" maxlength="20"></label>
  </div>
  <div id="messages"></div>

  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Сообщение..." maxlength="500">
    <button onclick="sendMessage()">Отпр.</button>
    <button class="record-btn" id="record-btn" title="Удерживайте для записи голосового">🎤</button>
    <span id="timer"></span>
  </div>
  <div id="mic-error" class="error"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // =========== ВСТАВЬ СЮДА СВОЙ КОНФИГ ===========
const firebaseConfig = {
  apiKey: "AIzaSyAlnrJNNmsfH2NhphvYN50i_GtlSgGUC30",
  authDomain: "fftf-6d8d0.firebaseapp.com",
  databaseURL: "https://fftf-6d8d0-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fftf-6d8d0",
  storageBucket: "fftf-6d8d0.firebasestorage.app",
  messagingSenderId: "467091018122",
  appId: "1:467091018122:web:2988d7028cf571b45df873"
};
    // =================================================

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'messages');

    // ---------- РАБОТА С СООБЩЕНИЯМИ (ТЕКСТ + ГОЛОС) ----------
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      displayMessage(msg);
    });

    function displayMessage(msg) {
      const messagesDiv = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg';

      const name = escapeHtml(msg.name || 'Аноним');

      if (msg.type === 'voice') {
        // Голосовое сообщение
        const audioSrc = msg.audioData; // base64 data URL
        const duration = msg.duration || 0;
        const durText = formatDuration(duration);
        msgDiv.innerHTML = `<strong>${name}:</strong> голосовое сообщение <span class="duration">${durText}</span><br>` +
                           `<audio controls src="${audioSrc}"></audio>`;
        msgDiv.classList.add('voice-msg');
      } else {
        // Обычное текстовое
        const text = escapeHtml(msg.text || '');
        msgDiv.innerHTML = `<strong>${name}:</strong> ${text}`;
      }

      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Отправка текста
    window.sendMessage = function() {
      const nameInput = document.getElementById('name-input');
      const msgInput = document.getElementById('msg-input');
      const name = nameInput.value.trim() || 'Аноним';
      const text = msgInput.value.trim();
      if (text === '') return;

      push(messagesRef, {
        name: name,
        text: text,
        type: 'text',
        timestamp: Date.now()
      });

      msgInput.value = '';
    };

    // ---------- ЗАПИСЬ ГОЛОСА ----------
    let mediaRecorder = null;
    let audioChunks = [];
    let recordStartTime = 0;
    let recordTimerInterval = null;
    let isRecording = false;
    const MAX_RECORD_SEC = 60;

    const recordBtn = document.getElementById('record-btn');
    const timerSpan = document.getElementById('timer');
    const micErrorDiv = document.getElementById('mic-error');

    // Проверим поддержку MediaRecorder
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      micErrorDiv.textContent = 'Ваш браузер не поддерживает запись аудио. Попробуйте Chrome, Firefox или Edge.';
      recordBtn.style.display = 'none';
    } else {
      // Предварительный запрос доступа к микрофону (необязательно, но может сгладить задержку)
      // Лучше делать по нажатию, чтобы не пугать пользователя. Сделаем при первом нажатии.
    }

    async function startRecording() {
      if (isRecording) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Определим поддерживаемый mime-тип (желательно WebM с Opus)
        let mimeType = 'audio/webm;codecs=opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'audio/webm'; // fallback
          if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'audio/ogg;codecs=opus';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
              mimeType = 'audio/mp4';
              if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = ''; // пусть браузер сам выберет
              }
            }
          }
        }

        const options = mimeType ? { mimeType } : {};
        mediaRecorder = new MediaRecorder(stream, options);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          // Останавливаем все дорожки стрима, чтобы микрофон выключился
          stream.getTracks().forEach(track => track.stop());
          // Собираем blob и отправляем
          if (audioChunks.length === 0) return;
          const audioBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64data = reader.result; // data:audio/...;base64,...
            const duration = Math.min((Date.now() - recordStartTime) / 1000, MAX_RECORD_SEC);
            const nameInput = document.getElementById('name-input');
            const name = nameInput.value.trim() || 'Аноним';
            push(messagesRef, {
              name: name,
              type: 'voice',
              audioData: base64data,
              duration: duration,
              timestamp: Date.now()
            });
          };
          reader.readAsDataURL(audioBlob);
        };

        mediaRecorder.start();
        isRecording = true;
        recordStartTime = Date.now();
        recordBtn.classList.add('recording');
        recordBtn.textContent = '🔴';
        micErrorDiv.textContent = '';

        // Запускаем таймер отображения длительности
        updateTimer();
        recordTimerInterval = setInterval(updateTimer, 200);

        // Автостоп через MAX_RECORD_SEC
        setTimeout(() => {
          if (isRecording) {
            stopRecording();
          }
        }, MAX_RECORD_SEC * 1000);

      } catch (err) {
        console.error(err);
        micErrorDiv.textContent = 'Не удалось получить доступ к микрофону. Разрешите доступ в настройках браузера.';
        recordBtn.classList.remove('recording');
        recordBtn.textContent = '🎤';
        isRecording = false;
      }
    }

    function stopRecording() {
      if (!isRecording || !mediaRecorder || mediaRecorder.state === 'inactive') return;
      mediaRecorder.stop();
      isRecording = false;
      recordBtn.classList.remove('recording');
      recordBtn.textContent = '🎤';
      clearInterval(recordTimerInterval);
      recordTimerInterval = null;
      timerSpan.textContent = '';
    }

    function updateTimer() {
      if (!isRecording) return;
      const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
      timerSpan.textContent = `${elapsed}с`;
    }

    function formatDuration(seconds) {
      seconds = Math.floor(seconds);
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) return `${mins}:${secs.toString().padStart(2, '0')}`;
      return `0:${secs.toString().padStart(2, '0')}`;
    }

    // ---------- ОБРАБОТЧИКИ КНОПКИ ЗАПИСИ (мышь + тач) ----------
    function attachRecordEvents() {
      // Мышь
      recordBtn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        startRecording();
      });
      recordBtn.addEventListener('mouseup', (e) => {
        e.preventDefault();
        stopRecording();
      });
      recordBtn.addEventListener('mouseleave', (e) => {
        // Если ушли с кнопки во время записи — остановить
        if (isRecording) stopRecording();
      });

      // Тач (мобильные)
      recordBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startRecording();
      });
      recordBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopRecording();
      });
      recordBtn.addEventListener('touchcancel', (e) => {
        if (isRecording) stopRecording();
      });
    }

    attachRecordEvents();

    // Enter для текстового поля
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') window.sendMessage();
    });

    // Вспомогательные функции
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }
  </script>
</body>
</html>
