<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мессенджер с видео-кружками 🎥🔔</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 0 15px; }
    #messages { border: 1px solid #ccc; border-radius: 8px; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fafafa; }
    .msg { margin-bottom: 10px; line-height: 1.4; }
    .msg strong { color: #0077cc; }
    .voice-msg audio, .video-msg video { width: 100%; max-width: 250px; margin-top: 4px; }
    .voice-msg .duration, .video-msg .duration { color: #888; font-size: 0.85em; margin-left: 5px; }

    .input-area { display: flex; align-items: center; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    #name-input { width: 100px; }
    #msg-input { flex: 1; min-width: 120px; }
    button { padding: 10px 15px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; background: #eee; }
    button:active { background: #ddd; }

    .record-btn {
      background: #f0f0f0;
      font-size: 20px;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
      user-select: none;
      border: none;
      cursor: pointer;
    }
    .record-btn.recording {
      background: #ff4444;
      color: white;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.5); }
      70% { box-shadow: 0 0 0 12px rgba(255,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
    }
    #timer { font-size: 0.9em; color: #888; min-width: 40px; text-align: center; }

    .error { color: #d00; font-size: 0.8em; margin: 5px 0; }
    #notification-status { font-size: 0.8em; color: #888; margin-left: 5px; }
  </style>
</head>
<body>
  <h2>Мой мессенджер 🎤📹🔔</h2>
  <div>
    <label>Твоё имя: <input type="text" id="name-input" placeholder="Ник" maxlength="20"></label>
    <span id="notification-status"></span>
  </div>
  <div id="messages"></div>

  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Сообщение..." maxlength="500">
    <button onclick="sendMessage()">Отпр.</button>
    <button class="record-btn" id="voice-btn" title="Удерживайте для записи голосового">🎤</button>
    <button class="record-btn" id="video-btn" title="Удерживайте для записи видео">📹</button>
    <span id="timer"></span>
  </div>
  <div id="mic-error" class="error"></div>
  <div id="cam-error" class="error"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // =========== ВСТАВЬ СЮДА СВОЙ КОНФИГ ===========
const firebaseConfig = {
  apiKey: "AIzaSyAlnrJNNmsfH2NhphvYN50i_GtlSgGUC30",
  authDomain: "fftf-6d8d0.firebaseapp.com",
  databaseURL: "https://fftf-6d8d0-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fftf-6d8d0",
  storageBucket: "fftf-6d8d0.firebasestorage.app",
  messagingSenderId: "467091018122",
  appId: "1:467091018122:web:2988d7028cf571b45df873"
};
    // =================================================

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'messages');

    // ---------- УВЕДОМЛЕНИЯ ----------
    const notifStatus = document.getElementById('notification-status');
    if ('Notification' in window) {
      if (Notification.permission === 'granted') {
        notifStatus.textContent = '🔔 Уведомления включены';
      } else if (Notification.permission === 'denied') {
        notifStatus.textContent = '🔕 Уведомления запрещены';
      } else {
        notifStatus.textContent = '🔔 Разрешить уведомления?';
        Notification.requestPermission().then(perm => {
          if (perm === 'granted') {
            notifStatus.textContent = '🔔 Уведомления включены';
          } else {
            notifStatus.textContent = '🔕 Уведомления запрещены';
          }
        });
      }
    } else {
      notifStatus.textContent = '⚠️ Браузер не поддерживает уведомления';
    }

    // ---------- ПОЛУЧЕНИЕ СООБЩЕНИЙ + УВЕДОМЛЕНИЯ ----------
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      displayMessage(msg);
      if (document.hidden && Notification.permission === 'granted') {
        showNotification(msg);
      }
    });

    function displayMessage(msg) {
      const messagesDiv = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg';
      const name = escapeHtml(msg.name || 'Аноним');

      if (msg.type === 'voice') {
        const durText = formatDuration(msg.duration || 0);
        msgDiv.innerHTML = `<strong>${name}:</strong> голосовое сообщение <span class="duration">${durText}</span><br>` +
                           `<audio controls src="${msg.audioData}"></audio>`;
        msgDiv.classList.add('voice-msg');
      } else if (msg.type === 'video') {
        const durText = formatDuration(msg.duration || 0);
        msgDiv.innerHTML = `<strong>${name}:</strong> видео-кружок <span class="duration">${durText}</span><br>` +
                           `<video controls src="${msg.videoData}" width="250"></video>`;
        msgDiv.classList.add('video-msg');
      } else {
        const text = escapeHtml(msg.text || '');
        msgDiv.innerHTML = `<strong>${name}:</strong> ${text}`;
      }

      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showNotification(msg) {
      const name = msg.name || 'Аноним';
      let body = '';
      if (msg.type === 'voice') body = '🎤 Голосовое сообщение';
      else if (msg.type === 'video') body = '🎥 Видео-кружок';
      else body = msg.text || '';
      const options = {
        body: body,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>',
        tag: 'chat-msg'
      };
      new Notification(`${name}`, options);
    }

    window.sendMessage = function() {
      const nameInput = document.getElementById('name-input');
      const msgInput = document.getElementById('msg-input');
      const name = nameInput.value.trim() || 'Аноним';
      const text = msgInput.value.trim();
      if (text === '') return;
      push(messagesRef, { name, text, type: 'text', timestamp: Date.now() });
      msgInput.value = '';
    };

    // ---------- ЗАПИСЬ ГОЛОСА ----------
    let voiceRecorder = null;
    let voiceChunks = [];
    let voiceStartTime = 0;
    let voiceTimerInterval = null;
    let isVoiceRecording = false;
    const MAX_VOICE_SEC = 60;

    const voiceBtn = document.getElementById('voice-btn');
    const timerSpan = document.getElementById('timer');
    const micErrorDiv = document.getElementById('mic-error');

    async function startVoiceRecording() {
      if (isVoiceRecording || isVideoRecording) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        let mimeType = 'audio/webm;codecs=opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'audio/webm';
          if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'audio/ogg;codecs=opus';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
              mimeType = 'audio/mp4';
              if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
            }
          }
        }
        const options = mimeType ? { mimeType } : {};
        voiceRecorder = new MediaRecorder(stream, options);
        voiceChunks = [];
        voiceRecorder.ondataavailable = (e) => { if (e.data.size > 0) voiceChunks.push(e.data); };
        voiceRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          if (voiceChunks.length === 0) return;
          const blob = new Blob(voiceChunks, { type: mimeType || 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64 = reader.result;
            const duration = Math.min((Date.now() - voiceStartTime) / 1000, MAX_VOICE_SEC);
            const name = document.getElementById('name-input').value.trim() || 'Аноним';
            push(messagesRef, { name, type: 'voice', audioData: base64, duration, timestamp: Date.now() });
          };
          reader.readAsDataURL(blob);
        };
        voiceRecorder.start();
        isVoiceRecording = true;
        voiceStartTime = Date.now();
        voiceBtn.classList.add('recording');
        voiceBtn.textContent = '🔴';
        micErrorDiv.textContent = '';
        updateVoiceTimer();
        voiceTimerInterval = setInterval(updateVoiceTimer, 200);
        setTimeout(() => { if (isVoiceRecording) stopVoiceRecording(); }, MAX_VOICE_SEC * 1000);
      } catch (err) {
        micErrorDiv.textContent = 'Нет доступа к микрофону. Разрешите в настройках браузера.';
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        isVoiceRecording = false;
      }
    }

    function stopVoiceRecording() {
      if (!isVoiceRecording || !voiceRecorder || voiceRecorder.state === 'inactive') return;
      voiceRecorder.stop();
      isVoiceRecording = false;
      voiceBtn.classList.remove('recording');
      voiceBtn.textContent = '🎤';
      clearInterval(voiceTimerInterval);
      voiceTimerInterval = null;
      timerSpan.textContent = '';
    }

    function updateVoiceTimer() {
      if (!isVoiceRecording) return;
      const elapsed = Math.floor((Date.now() - voiceStartTime) / 1000);
      timerSpan.textContent = `${elapsed}с`;
    }

    // ---------- ЗАПИСЬ ВИДЕО (КРУЖКИ) ----------
    let videoRecorder = null;
    let videoChunks = [];
    let videoStartTime = 0;
    let videoTimerInterval = null;
    let isVideoRecording = false;
    const MAX_VIDEO_SEC = 30; // ограничение по размеру

    const videoBtn = document.getElementById('video-btn');
    const camErrorDiv = document.getElementById('cam-error');

    async function startVideoRecording() {
      if (isVoiceRecording || isVideoRecording) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240, facingMode: 'user' },
          audio: true
        });
        let mimeType = 'video/webm;codecs=vp8,opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'video/webm';
          if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'video/mp4';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
          }
        }
        const options = mimeType ? { mimeType } : {};
        videoRecorder = new MediaRecorder(stream, options);
        videoChunks = [];
        videoRecorder.ondataavailable = (e) => { if (e.data.size > 0) videoChunks.push(e.data); };
        videoRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          if (videoChunks.length === 0) return;
          const blob = new Blob(videoChunks, { type: mimeType || 'video/webm' });
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64 = reader.result;
            const duration = Math.min((Date.now() - videoStartTime) / 1000, MAX_VIDEO_SEC);
            const name = document.getElementById('name-input').value.trim() || 'Аноним';
            push(messagesRef, { name, type: 'video', videoData: base64, duration, timestamp: Date.now() });
          };
          reader.readAsDataURL(blob);
        };
        videoRecorder.start();
        isVideoRecording = true;
        videoStartTime = Date.now();
        videoBtn.classList.add('recording');
        videoBtn.textContent = '🔴';
        camErrorDiv.textContent = '';
        updateVideoTimer();
        videoTimerInterval = setInterval(updateVideoTimer, 200);
        setTimeout(() => { if (isVideoRecording) stopVideoRecording(); }, MAX_VIDEO_SEC * 1000);
      } catch (err) {
        camErrorDiv.textContent = 'Нет доступа к камере. Разрешите в настройках браузера.';
        videoBtn.classList.remove('recording');
        videoBtn.textContent = '📹';
        isVideoRecording = false;
      }
    }

    function stopVideoRecording() {
      if (!isVideoRecording || !videoRecorder || videoRecorder.state === 'inactive') return;
      videoRecorder.stop();
      isVideoRecording = false;
      videoBtn.classList.remove('recording');
      videoBtn.textContent = '📹';
      clearInterval(videoTimerInterval);
      videoTimerInterval = null;
      timerSpan.textContent = '';
    }

    function updateVideoTimer() {
      if (!isVideoRecording) return;
      const elapsed = Math.floor((Date.now() - videoStartTime) / 1000);
      timerSpan.textContent = `${elapsed}с`;
    }

    // ---------- ОБРАБОТЧИКИ КНОПОК ----------
    function attachVoiceEvents() {
      voiceBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startVoiceRecording(); });
      voiceBtn.addEventListener('mouseup', (e) => { e.preventDefault(); stopVoiceRecording(); });
      voiceBtn.addEventListener('mouseleave', (e) => { if (isVoiceRecording) stopVoiceRecording(); });
      voiceBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startVoiceRecording(); });
      voiceBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopVoiceRecording(); });
      voiceBtn.addEventListener('touchcancel', (e) => { if (isVoiceRecording) stopVoiceRecording(); });
    }

    function attachVideoEvents() {
      videoBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startVideoRecording(); });
      videoBtn.addEventListener('mouseup', (e) => { e.preventDefault(); stopVideoRecording(); });
      videoBtn.addEventListener('mouseleave', (e) => { if (isVideoRecording) stopVideoRecording(); });
      videoBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startVideoRecording(); });
      videoBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopVideoRecording(); });
      videoBtn.addEventListener('touchcancel', (e) => { if (isVideoRecording) stopVideoRecording(); });
    }

    attachVoiceEvents();
    attachVideoEvents();

    // Enter для отправки текста
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') window.sendMessage();
    });

    function formatDuration(seconds) {
      seconds = Math.floor(seconds);
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) return `${mins}:${secs.toString().padStart(2, '0')}`;
      return `0:${secs.toString().padStart(2, '0')}`;
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }
  </script>
</body>
</html>
